# OBS Events — nginx site config (§4.5).
# Single-host layout: nginx serves the React SPA statically AND reverse-proxies
# the API on the same domain. (Alternative: host the SPA on S3 + CloudFront and
# keep only the API server block here — see deploy/DEPLOY.md.)
#
# Install:  sudo cp deploy/nginx.conf /etc/nginx/sites-available/obs
#           sudo ln -s /etc/nginx/sites-available/obs /etc/nginx/sites-enabled/obs
#           sudo nginx -t && sudo systemctl reload nginx
# TLS:      sudo certbot --nginx -d obsevents.com -d www.obsevents.com

server {
    listen 80;
    server_name obsevents.com www.obsevents.com;
    # certbot rewrites this to 443 + redirects 80→443 after issuance.

    # --- React SPA (Vite build output copied to /var/www/obs/dist) ---
    root /var/www/obs/dist;
    index index.html;

    # Long-cache fingerprinted assets; never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- API reverse proxy ---
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SEO endpoints are generated by the API but must live at the site root ---
    location = /sitemap.xml { proxy_pass http://127.0.0.1:4000/sitemap.xml; proxy_set_header Host $host; }
    location = /robots.txt  { proxy_pass http://127.0.0.1:4000/robots.txt;  proxy_set_header Host $host; }

    # --- SPA history fallback (must be LAST) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 2m;   # matches the API's 1mb JSON limit + headroom
}
